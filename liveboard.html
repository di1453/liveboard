<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 응답 피드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07080f;
  --panel:   #0e0f1a;
  --border:  rgba(255,255,255,0.06);
  --text:    #dde0f0;
  --muted:   rgba(221,224,240,0.35);
  --c1:      #5b8fff;
  --c2:      #ff5f87;
  --c3:      #2dd9a0;
  --header-h: 88px;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  flex-direction: column;
}

header {
  height: var(--header-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,8,15,0.9);
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 10;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: .12em;
  color: var(--text);
}
.logo span { color: var(--c1); }

.header-meta { display: flex; align-items: center; gap: 16px; }

.live-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,80,80,.1);
  border: 1px solid rgba(255,80,80,.25);
  border-radius: 999px; padding: 5px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: .1em; color: #ff7070;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #ff5050;
  animation: blink 1.3s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.3; transform:scale(.65); }
}

.total-count {
  font-size: 12px; color: var(--muted);
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 12px;
}
.total-count b { color: var(--text); font-weight: 700; }

.sync-status {
  font-size: 11px; color: var(--muted);
}

.columns {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  overflow: hidden;
  min-height: 0;
}

.col {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden; position: relative;
}
.col:last-child { border-right: none; }

.col-header {
  flex-shrink: 0;
  padding: 18px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  position: relative; overflow: hidden;
}
.col-header::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--col-color); opacity: .7;
}
.col-header::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--col-color) 0%, transparent 55%);
  opacity: .05;
}

.col-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: .2em;
  color: var(--col-color); margin-bottom: 4px;
}
.col-question {
  font-size: 14px; font-weight: 700; line-height: 1.45; color: var(--text);
}
.col-count { margin-top: 8px; font-size: 11px; color: var(--muted); }
.col-count b { color: var(--col-color); font-weight: 700; }

.col-feed {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scroll-behavior: smooth;
  mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
}
.col-feed::-webkit-scrollbar { width: 3px; }
.col-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.feed-card {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  position: relative;
  animation: cardIn .45s cubic-bezier(.22,.68,0,1.2) both;
  transition: background .2s;
}
.feed-card:hover { background: rgba(255,255,255,.025); }
.feed-card::before {
  content: ''; position: absolute;
  left: 0; top: 18px; bottom: 18px; width: 2px;
  background: var(--col-color); opacity: 0; border-radius: 0 2px 2px 0;
  transition: opacity .2s;
}
.feed-card:hover::before { opacity: .6; }
.feed-card.is-new { background: rgba(255,255,255,.04); }
.feed-card.is-new::before { opacity: .8 !important; }

.card-text { font-size: 14px; line-height: 1.75; color: var(--text); word-break: keep-all; }
.card-time { margin-top: 8px; font-size: 10px; color: var(--muted); letter-spacing: .04em; }

.col-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; pointer-events: none;
  opacity: .25; transition: opacity .4s;
}
.col-empty.hidden { opacity: 0; }
.empty-circle {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1.5px dashed var(--col-color);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--col-color);
}
.col-empty span { font-size: 12px; color: var(--muted); }

body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 15% 50%, rgba(91,143,255,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 20%, rgba(255,95,135,.05) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, rgba(45,217,160,.04) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(-16px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.footer-bar {
  height: 36px; flex-shrink: 0;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.footer-cell {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 11px; color: var(--muted);
  border-right: 1px solid var(--border);
}
.footer-cell:last-child { border-right: none; }
.footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fc); }
</style>
</head>
<body>

<header>
  <div class="logo">LIVE<span>.</span>BOARD</div>
  <div class="header-meta">
    <div class="live-pill"><span class="live-dot"></span>LIVE</div>
    <div class="total-count">총 응답 <b id="total-num">0</b>개</div>
    <div class="sync-status" id="sync-status">연결 중...</div>
  </div>
</header>

<div class="columns">

  <div class="col" style="--col-color: var(--c1)">
    <div class="col-header">
      <div class="col-num">QUESTION 01</div>
      <div class="col-question" id="q1-title">질문 1</div>
      <div class="col-count"><b id="count-1">0</b>개의 응답</div>
    </div>
    <div class="col-feed" id="feed-1">
      <div class="col-empty" id="empty-1">
        <div class="empty-circle">✦</div>
        <span>응답을 기다리는 중</span>
      </div>
    </div>
  </div>

  <div class="col" style="--col-color: var(--c2)">
    <div class="col-header">
      <div class="col-num">QUESTION 02</div>
      <div class="col-question" id="q2-title">질문 2</div>
      <div class="col-count"><b id="count-2">0</b>개의 응답</div>
    </div>
    <div class="col-feed" id="feed-2">
      <div class="col-empty" id="empty-2">
        <div class="empty-circle">✦</div>
        <span>응답을 기다리는 중</span>
      </div>
    </div>
  </div>

  <div class="col" style="--col-color: var(--c3)">
    <div class="col-header">
      <div class="col-num">QUESTION 03</div>
      <div class="col-question" id="q3-title">질문 3</div>
      <div class="col-count"><b id="count-3">0</b>개의 응답</div>
    </div>
    <div class="col-feed" id="feed-3">
      <div class="col-empty" id="empty-3">
        <div class="empty-circle">✦</div>
        <span>응답을 기다리는 중</span>
      </div>
    </div>
  </div>

</div>

<div class="footer-bar">
  <div class="footer-cell"><span class="footer-dot" style="--fc:var(--c1)"></span>Q1 · <b id="fc1">0</b>개</div>
  <div class="footer-cell"><span class="footer-dot" style="--fc:var(--c2)"></span>Q2 · <b id="fc2">0</b>개</div>
  <div class="footer-cell"><span class="footer-dot" style="--fc:var(--c3)"></span>Q3 · <b id="fc3">0</b>개</div>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
const SHEET_ID = '1GyMx9ewYEZTryOpH6UQoq_jov6wgJI8eJHMTw-6edgg';
const SHEET_NAME = encodeURIComponent('시트1'); // 복사본 시트 탭 이름
const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
const REFRESH_MS = 15000; // 15초마다 갱신
// ─────────────────────────────────────────────────

const counts = { 1: 0, 2: 0, 3: 0 };
let knownRows = new Set(); // 이미 표시한 행 추적
let isFirstLoad = true;

// CSV 파싱 (쌍따옴표, 줄바꿈 처리 포함)
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function timeStr() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function addCard(qNum, text, isNew) {
  if (!text || !text.trim()) return;

  const feed = document.getElementById(`feed-${qNum}`);
  const empty = document.getElementById(`empty-${qNum}`);
  empty.classList.add('hidden');

  const card = document.createElement('div');
  card.className = 'feed-card' + (isNew ? ' is-new' : '');
  card.innerHTML = `
    <div class="card-text">${text}</div>
    <div class="card-time">${timeStr()}</div>
  `;

  // 새 응답은 맨 위, 초기 로드는 맨 아래
  if (isNew) {
    feed.insertBefore(card, feed.children[1] ?? null);
    setTimeout(() => card.classList.remove('is-new'), 2500);
  } else {
    feed.appendChild(card);
  }

  counts[qNum]++;
  document.getElementById(`count-${qNum}`).textContent = counts[qNum];
  document.getElementById(`fc${qNum}`).textContent = counts[qNum];
  document.getElementById('total-num').textContent = counts[1] + counts[2] + counts[3];
}

async function fetchAndUpdate() {
  try {
    // 캐시 우회를 위해 타임스탬프 파라미터 추가
    const res = await fetch(JSON_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('fetch 실패');

    // 구글 JSON API는 앞에 불필요한 텍스트가 붙어서 제거 필요
    const raw = await res.text();
    const json = JSON.parse(raw.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));

    const table = json.table;
    if (!table || !table.rows) return;

    // 헤더 행에서 질문 제목 추출
    if (table.cols) {
      const labels = table.cols.map(c => c.label).filter(Boolean);
      if (labels[0]) document.getElementById('q1-title').textContent = labels[0];
      if (labels[1]) document.getElementById('q2-title').textContent = labels[1];
      if (labels[2]) document.getElementById('q3-title').textContent = labels[2];
    }

    // 데이터 행 처리
    table.rows.forEach((row, idx) => {
      const c = row.c || [];
      const v0 = c[0]?.v ?? '';
      const v1 = c[1]?.v ?? '';
      const v2 = c[2]?.v ?? '';

      const key = `${idx}_${v0}_${v1}_${v2}`;
      if (knownRows.has(key)) return; // 이미 표시한 행 스킵
      knownRows.add(key);

      const isNew = !isFirstLoad;

      if (v0) addCard(1, v0, isNew);
      if (v1) addCard(2, v1, isNew);
      if (v2) addCard(3, v2, isNew);
    });

    isFirstLoad = false;

    // 상태 표시 업데이트
    const now = new Date();
    const timeStr2 = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('sync-status').textContent = `마지막 갱신 ${timeStr2}`;

  } catch (e) {
    document.getElementById('sync-status').textContent = '연결 오류 — 재시도 중';
    console.error(e);
  }
}

// 초기 로드 + 주기적 갱신
fetchAndUpdate();
setInterval(fetchAndUpdate, REFRESH_MS);
</script>
</body>
</html>
